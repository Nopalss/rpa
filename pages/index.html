<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Monitoring Dashboard</title>

  <style>
    html, body {
      margin: 0;
      padding: 0;
      width: 100%;
      height: 100%;
      background: #000;
      overflow: hidden;
      font-family: Arial, sans-serif;
    }

    iframe {
      position: absolute;
      top: 0;
      left: 0;
      width: 100%;
      height: 100%;
      border: 0;
      opacity: 0;
      pointer-events: none;
      transition: opacity 1.2s ease-in-out;
    }

    iframe.active {
      opacity: 1;
      pointer-events: auto;
      z-index: 1;
    }

    /* TOGGLE BUTTON */
    .menu-toggle {
      position: fixed;
      top: 12px;
      right: 12px;
      z-index: 10000;
      background: rgba(0, 0, 0, 0.75);
      color: #fff;
      border: 1px solid #444;
      width: 34px;
      height: 34px;
      border-radius: 6px;
      cursor: pointer;
      font-size: 18px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .menu-toggle:hover {
      background: rgba(0, 0, 0, 0.9);
    }

    /* PAGE INDICATOR */
    .page-indicator {
      position: fixed;
      top: 52px;
      right: 12px;
      z-index: 9998;
      background: rgba(0, 0, 0, 0.6);
      color: #fff;
      border-radius: 6px;
      padding: 4px 10px;
      font-size: 11px;
      pointer-events: none;
      white-space: nowrap;
    }

    /* CONTROL PANEL */
    .control-panel {
      position: fixed;
      top: 82px;
      right: 12px;
      z-index: 9999;
      background: rgba(0, 0, 0, 0.75);
      border-radius: 8px;
      padding: 10px;
      display: flex;
      flex-direction: column;
      gap: 8px;
      min-width: 180px;
      transform: translateY(-10px);
      opacity: 0;
      pointer-events: none;
      transition: all 0.25s ease;
    }

    .control-panel.show {
      transform: translateY(0);
      opacity: 1;
      pointer-events: auto;
    }

    .control-panel button {
      background: #222;
      color: #fff;
      border: 1px solid #444;
      padding: 6px 10px;
      font-size: 12px;
      border-radius: 5px;
      cursor: pointer;
      transition: background 0.2s;
      text-align: left;
    }

    .control-panel button:hover {
      background: #333;
    }

    .control-panel button.active {
      background: #007bff;
      border-color: #007bff;
    }
  </style>
</head>
<body>

<!-- MENU TOGGLE -->
<div class="menu-toggle" id="menuToggle">⋮</div>

<!-- PAGE INDICATOR -->
<div class="page-indicator" id="pageIndicator">
  Mode: Auto • Normal • MinMax
</div>

<!-- CONTROL PANEL -->
<div class="control-panel" id="controlPanel">
  <button id="btnAuto" class="active">🔄 Auto (Mix)</button>

  <hr style="border:0;border-top:1px solid #444;">

  <button id="btnMain">📊 MinMax</button>
  <button id="btnSub">📈 Dashboard</button>
  <button id="btnBack">↩ Kembali</button>


  <hr style="border:0;border-top:1px solid #444;">

  <button id="speedFast">⚡ Fast (30s)</button>
  <button id="speedNormal" class="active">⏱ Normal (5m)</button>
  <button id="speedSlow">🐢 Slow (10m)</button>

  <hr style="border:0;border-top:1px solid #444;">

  <button id="btnPause">⏸ Pause</button>
  <button id="btnResume">▶ Resume</button>
</div>

<!-- DASHBOARD IFRAMES -->
<iframe id="main" src="dashboard.php" class="active"></iframe>
<iframe id="sub" src="dashboard2.php"></iframe>

<script>
  const DASHBOARDS = ['main', 'sub'];

  const SPEEDS = {
    fast:   30000,   // 30 detik
    normal: 300000,  // 5 menit
    slow:   600000   // 10 menit
  };

  let SWITCH_INTERVAL = SPEEDS.normal;

  let currentIndex = 0;
  let isPaused = false;
  let isAutoMode = true;
  let speedMode = 'normal';
  let timer = null;

  const panel = document.getElementById('controlPanel');
  const toggleBtn = document.getElementById('menuToggle');
  const indicator = document.getElementById('pageIndicator');
  const btnBack = document.getElementById('btnBack');

  btnBack.onclick = () => {
    if (window.history.length > 1) {
      window.history.back();
    } else {
      // fallback kalau tidak ada history
      window.location.href = '/';
    }
  };
  /* PANEL TOGGLE */
  toggleBtn.onclick = () => panel.classList.toggle('show');
  document.addEventListener('click', e => {
    if (!panel.contains(e.target) && !toggleBtn.contains(e.target)) {
      panel.classList.remove('show');
    }
  });

  function setActiveDashboard(id) {
    DASHBOARDS.forEach(d => document.getElementById(d).classList.remove('active'));
    document.getElementById(id).classList.add('active');
    currentIndex = DASHBOARDS.indexOf(id);
    updateIndicator();
  }

 function updateIndicator() {
  const page = currentIndex === 0 ? 'Dashboard' : 'MinMax';
  const mode = isAutoMode ? (isPaused ? 'Paused' : 'Auto') : 'Manual';
  indicator.textContent = `Mode: ${mode} • ${speedMode.toUpperCase()} • ${page}`;
}

  function scheduleNextSwitch() {
    clearTimeout(timer);
    if (isPaused || !isAutoMode) return;

    timer = setTimeout(() => {
      currentIndex = (currentIndex + 1) % DASHBOARDS.length;
      setActiveDashboard(DASHBOARDS[currentIndex]);
      scheduleNextSwitch();
    }, SWITCH_INTERVAL);
  }

  function setSpeed(mode) {
    speedMode = mode;
    SWITCH_INTERVAL = SPEEDS[mode];

    ['speedFast','speedNormal','speedSlow'].forEach(id =>
      document.getElementById(id).classList.remove('active')
    );

    document.getElementById(
      mode === 'fast' ? 'speedFast' :
      mode === 'slow' ? 'speedSlow' : 'speedNormal'
    ).classList.add('active');

    updateIndicator();
    if (isAutoMode && !isPaused) scheduleNextSwitch();
  }

  /* BUTTON EVENTS */
  btnAuto.onclick = () => { isAutoMode = true; isPaused = false; scheduleNextSwitch(); updateIndicator(); };
  btnMain.onclick = () => { isAutoMode = false; isPaused = true; setActiveDashboard('main'); };
  btnSub.onclick  = () => { isAutoMode = false; isPaused = true; setActiveDashboard('sub'); };
  btnPause.onclick = () => { isPaused = true; clearTimeout(timer); updateIndicator(); };
  btnResume.onclick = () => { isPaused = false; isAutoMode = true; scheduleNextSwitch(); updateIndicator(); };

  speedFast.onclick   = () => setSpeed('fast');
  speedNormal.onclick = () => setSpeed('normal');
  speedSlow.onclick   = () => setSpeed('slow');

  /* INIT */
  updateIndicator();
  scheduleNextSwitch();
</script>

</body>
</html>
